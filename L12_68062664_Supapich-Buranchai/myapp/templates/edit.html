{% extends "base.html" %}

{% block content %}
<div class="hero-section">
    <h1 class="display-4 fw-bold mb-3">แก้ไขข้อมูลประชากร</h1>
    <p class="lead opacity-75">รหัสรายการ: #{{person.id}} | ปรับปรุงข้อมูลล่าสุดเมื่อ {{ person.updated_at|date:"d M Y" }}</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card shadow-lg">
            <div class="card-header bg-warning text-dark py-3 border-0">
                <h5 class="m-0 text-center fw-bold">
                    <i class="bi bi-pencil-square me-2"></i>แบบฟอร์มแก้ไขข้อมูล
                </h5>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post" action="/edit/{{person.id}}/">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="name" class="form-label fw-600">ชื่อ-นามสกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="name" name="name" value="{{person.name}}" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="age" class="form-label fw-600">อายุ (ปี)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar3"></i></span>
                            <input type="number" class="form-control bg-light border-start-0 ps-0" id="age" name="age" value="{{person.age}}" min="0" max="150" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-warning btn-modern btn-lg w-100 justify-content-center fw-bold">
                            <i class="bi bi-save"></i> บันทึกการเปลี่ยนแปลง
                        </button>
                        <a href="/" class="btn btn-outline-secondary btn-modern w-100 justify-content-center">
                            ยกเลิก
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
